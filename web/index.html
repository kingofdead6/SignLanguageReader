<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign → Text</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #14141d;
    --accent: #34f5c5;
    --text: #e8e8f0;
    --dim: #6b6b80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.05em; }
  h1 span { color: var(--accent); }
  .status { color: var(--dim); font-size: 0.85rem; margin: 6px 0 24px; }
  .status.live { color: var(--accent); }
  .grid { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .card {
    background: var(--panel);
    border: 1px solid #22222e;
    border-radius: 16px;
    padding: 20px;
  }
  .stage { position: relative; width: 360px; height: 300px; }
  /* live webcam feed, mirrored like a selfie (matches desktop cv2.flip) */
  #video, #skeleton {
    position: absolute; inset: 0;
    width: 360px; height: 300px; border-radius: 10px;
  }
  #video { object-fit: cover; transform: scaleX(-1); background: #0e0e15; }
  #skeleton { transform: scaleX(-1); background: transparent; }
  .gesture {
    font-size: 4rem; font-weight: 700; color: var(--accent);
    text-align: center; min-height: 5rem; line-height: 5rem;
  }
  .confbar-wrap {
    width: 100%; height: 6px; background: #22222e;
    border-radius: 3px; overflow: hidden; margin-top: 10px;
  }
  .confbar {
    height: 100%; width: 0%; background: var(--accent);
    transition: width 0.12s linear;
  }
  .sentence-card { width: min(660px, 92vw); margin-top: 24px; }
  .sentence {
    font-size: 1.6rem; min-height: 2.4rem; letter-spacing: 0.08em;
    word-break: break-all;
  }
  .cursor {
    display: inline-block; width: 3px; height: 1.5rem;
    background: var(--accent); animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }
  button {
    margin-top: 14px; background: transparent; color: var(--dim);
    border: 1px solid #2c2c3a; padding: 8px 18px; border-radius: 8px;
    cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
  }
  button:hover { color: var(--accent); border-color: var(--accent); }
  .hint { color: var(--dim); font-size: 0.78rem; margin-top: 18px; max-width: 560px; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
  <h1>SIGN <span>→</span> TEXT</h1>
  <div class="status" id="status">starting…</div>

  <div class="grid">
    <div class="card">
      <div class="stage">
        <video id="video" playsinline muted></video>
        <canvas id="skeleton" width="360" height="300"></canvas>
      </div>
    </div>
    <div class="card" style="width:280px; display:flex; flex-direction:column; justify-content:center;">
      <div class="gesture" id="gesture">–</div>
      <div class="confbar-wrap"><div class="confbar" id="confbar"></div></div>
      <div class="status" id="conftext" style="text-align:center; margin-top:8px;">0%</div>
    </div>
  </div>

  <div class="card sentence-card">
    <div class="sentence"><span id="sentence"></span><span class="cursor"></span></div>
    <button id="clear">clear</button>
  </div>

  <p class="hint">
    Everything runs in your browser — the webcam never leaves your machine.
    Show ASL fingerspelling; hold a letter steady to commit it.
    Sign <b>space</b> / <b>del</b> to edit, drop your hand between letters.
  </p>

<script type="module" src="app.js"></script>
</body>
</html>
