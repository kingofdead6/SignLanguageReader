<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign → Text</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #14141d;
    --accent: #34f5c5;
    --text: #e8e8f0;
    --dim: #6b6b80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.05em; }
  h1 span { color: var(--accent); }
  .status { color: var(--dim); font-size: 0.85rem; margin: 6px 0 24px; }
  .status.live { color: var(--accent); }
  .grid { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .card {
    background: var(--panel);
    border: 1px solid #22222e;
    border-radius: 16px;
    padding: 20px;
  }
  .videowrap { position: relative; width: 420px; max-width: 84vw; }
  video, #overlay {
    width: 100%; border-radius: 10px; display: block;
    transform: scaleX(-1);          /* selfie mirror */
  }
  #overlay { position: absolute; inset: 0; pointer-events: none; }
  .gesture {
    font-size: 4rem; font-weight: 700; color: var(--accent);
    text-align: center; min-height: 5rem; line-height: 5rem;
  }
  .confbar-wrap {
    width: 100%; height: 6px; background: #22222e;
    border-radius: 3px; overflow: hidden; margin-top: 10px;
  }
  .confbar {
    height: 100%; width: 0%; background: var(--accent);
    transition: width 0.12s linear;
  }
  .sentence-card { width: min(700px, 92vw); margin-top: 24px; }
  .sentence {
    font-size: 1.6rem; min-height: 2.4rem; letter-spacing: 0.08em;
    word-break: break-all;
  }
  .cursor {
    display: inline-block; width: 3px; height: 1.5rem;
    background: var(--accent); animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }
  button {
    margin-top: 14px; background: transparent; color: var(--dim);
    border: 1px solid #2c2c3a; padding: 8px 18px; border-radius: 8px;
    cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
  }
  button:hover { color: var(--accent); border-color: var(--accent); }
  .flash { animation: flash 0.35s ease; }
  @keyframes flash { 0% { color: #fff; } 100% { color: var(--accent); } }
</style>
</head>
<body>
  <h1>SIGN <span>→</span> TEXT</h1>
  <div class="status" id="status">loading hand tracker…</div>

  <div class="grid">
    <div class="card">
      <div class="videowrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>
    </div>
    <div class="card" style="width:280px; display:flex; flex-direction:column; justify-content:center;">
      <div class="gesture" id="gesture">–</div>
      <div class="confbar-wrap"><div class="confbar" id="confbar"></div></div>
      <div class="status" id="conftext" style="text-align:center; margin-top:8px;">0%</div>
    </div>
  </div>

  <div class="card sentence-card">
    <div class="sentence"><span id="sentence"></span><span class="cursor"></span></div>
    <button id="clear">clear</button>
  </div>

  <!-- ================= TEXT -> SIGN (inverse mode) ================= -->
  <div class="card sentence-card" style="margin-top:24px;">
    <h1 style="font-size:1rem; margin-bottom:14px;">TEXT <span>→</span> SIGN</h1>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <input id="t2s-input" type="text" maxlength="60"
             placeholder="type something… e.g. HELLO"
             style="flex:1; min-width:180px; background:#0e0e15; color:var(--text);
                    border:1px solid #2c2c3a; border-radius:8px; padding:10px 14px;
                    font-size:1rem; letter-spacing:0.08em; outline:none;" />
      <button id="t2s-play" style="margin-top:0;">▶ sign it</button>
      <button id="t2s-stop" style="margin-top:0;">■ stop</button>
    </div>
    <div class="status" id="t2s-status" style="margin:10px 0 6px;">loading poses…</div>
    <div id="t2s-letters" style="font-size:1.3rem; letter-spacing:0.35em;
         min-height:1.8rem; margin-bottom:8px;"></div>
    <canvas id="t2s-canvas" width="340" height="430"
            style="display:block; margin:0 auto; background:#0e0e15;
                   border-radius:10px; max-width:100%;"></canvas>
  </div>

<script type="module">
  import { HandLandmarker, FilesetResolver } from
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

  // ================= CONFIG =================
  // Point this at YOUR hosted API. Leave null to auto-use the same origin
  // that served this page (works for local `python server.py` testing).
  const API_BASE = "http://127.0.0.1:8000"
  const SEND_FPS = 20;     // landmark messages per second sent to the API
  // ===========================================

  // Build candidate WS URLs. On Windows, `localhost` sometimes resolves to
  // IPv6 ::1 while the server listens on IPv4 only — so if one host fails
  // to connect, we automatically try the other.
  const WS_URLS = (() => {
    let base = API_BASE ?? location.origin;
    base = base.replace("//0.0.0.0", "//localhost"); // bind addr, not routable
    const toWs = (b) => b.replace(/^http/, "ws") + "/ws";
    const urls = [toWs(base)];
    if (base.includes("//localhost")) {
      urls.push(toWs(base.replace("//localhost", "//127.0.0.1")));
    } else if (base.includes("//127.0.0.1")) {
      urls.push(toWs(base.replace("//127.0.0.1", "//localhost")));
    }
    return urls;
  })();
  let wsUrlIdx = 0;

  const CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],        // thumb
    [0,5],[5,6],[6,7],[7,8],        // index
    [5,9],[9,10],[10,11],[11,12],   // middle
    [9,13],[13,14],[14,15],[15,16], // ring
    [13,17],[17,18],[18,19],[19,20],// pinky
    [0,17]                          // palm base
  ];

  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const octx = overlay.getContext('2d');
  const statusEl = document.getElementById('status');
  const gestureEl = document.getElementById('gesture');
  const confbar = document.getElementById('confbar');
  const conftext = document.getElementById('conftext');
  const sentenceEl = document.getElementById('sentence');

  let ws = null;
  let landmarker = null;
  let lastSend = 0;

  // ---------- WebSocket to your API ----------
  function connect() {
    const url = WS_URLS[wsUrlIdx % WS_URLS.length];
    ws = new WebSocket(url);
    let opened = false;
    ws.onopen = () => {
      opened = true;
      statusEl.textContent = '● live (' + url + ')';
      statusEl.classList.add('live');
    };
    ws.onclose = () => {
      if (!opened) wsUrlIdx++;   // never connected -> try the other host next
      statusEl.textContent = 'API disconnected — retrying ' +
        WS_URLS[wsUrlIdx % WS_URLS.length] + ' …';
      statusEl.classList.remove('live');
      setTimeout(connect, 1500);
    };
    ws.onmessage = (e) => {
      let d;
      try {
        d = JSON.parse(e.data);
      } catch {
        // Non-JSON message (e.g. a plain-text greeting from the backend) — ignore
        console.debug('ignoring non-JSON ws message:', e.data);
        return;
      }
      if (!d || d.type !== 'frame') return;
      gestureEl.textContent = d.gesture === 'nothing' ? '–' : d.gesture;
      const pct = Math.round(d.confidence * 100);
      confbar.style.width = pct + '%';
      conftext.textContent = pct + '%';
      sentenceEl.textContent = d.sentence;
      if (d.committed) {
        gestureEl.classList.remove('flash');
        void gestureEl.offsetWidth;      // restart animation
        gestureEl.classList.add('flash');
      }
    };
  }
  document.getElementById('clear').onclick = () =>
    ws && ws.readyState === 1 && ws.send(JSON.stringify({ type: 'clear' }));

  // ---------- Local skeleton drawing (client-side, zero latency) ----------
  function drawHand(pts) {
    octx.clearRect(0, 0, overlay.width, overlay.height);
    if (!pts) return;
    const W = overlay.width, H = overlay.height;
    octx.strokeStyle = 'rgba(52,245,197,0.65)';
    octx.lineWidth = 3;
    for (const [a, b] of CONNECTIONS) {
      octx.beginPath();
      octx.moveTo(pts[a].x * W, pts[a].y * H);
      octx.lineTo(pts[b].x * W, pts[b].y * H);
      octx.stroke();
    }
    pts.forEach((p, i) => {
      octx.beginPath();
      octx.arc(p.x * W, p.y * H, i % 4 === 0 ? 6 : 4, 0, Math.PI * 2);
      octx.fillStyle = i % 4 === 0 ? '#34f5c5' : '#ffffff';
      octx.fill();
    });
  }

  // ---------- MediaPipe in the browser ----------
  async function initTracker() {
    const fileset = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    landmarker = await HandLandmarker.createFromOptions(fileset, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU",     // falls back to CPU automatically
      },
      runningMode: "VIDEO",
      numHands: 1,
    });
  }

  async function initCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480 }, audio: false,
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
  }

  function loop() {
    if (landmarker && video.readyState >= 2) {
      const result = landmarker.detectForVideo(video, performance.now());
      const hand = result.landmarks && result.landmarks[0];
      drawHand(hand || null);

      // Throttle what we send to the API — the skeleton stays 60fps locally
      const now = performance.now();
      if (ws && ws.readyState === 1 && now - lastSend > 1000 / SEND_FPS) {
        lastSend = now;
        if (hand) {
          ws.send(JSON.stringify({
            type: 'landmarks',
            landmarks: hand.map(p => [
              +p.x.toFixed(4), +p.y.toFixed(4), +p.z.toFixed(4)
            ]),
          }));
        } else {
          ws.send(JSON.stringify({ type: 'empty' }));
        }
      }
    }
    requestAnimationFrame(loop);
  }

  (async () => {
    try {
      statusEl.textContent = 'loading hand tracker…';
      await initTracker();
      statusEl.textContent = 'requesting camera…';
      await initCamera();
      connect();
      loop();
    } catch (err) {
      statusEl.textContent = 'error: ' + err.message;
      console.error(err);
    }
  })();

  // ================================================================
  //          TEXT -> SIGN : line-figure signing animation
  // ================================================================
  // Poses come from YOUR dataset (export_poses.py): one representative
  // normalized hand pose per letter (wrist at origin, unit anatomical
  // scale). We draw a stick figure whose raised hand morphs between
  // letter poses with eased interpolation.
  (() => {
    const canvas = document.getElementById('t2s-canvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('t2s-input');
    const playBtn = document.getElementById('t2s-play');
    const stopBtn = document.getElementById('t2s-stop');
    const t2sStatus = document.getElementById('t2s-status');
    const lettersEl = document.getElementById('t2s-letters');

    // Timing arrives from the server with each /sign response
    let TRANSITION_MS = 380, HOLD_MS = 680;
    const HAND_SCALE = 55;       // px per normalized unit

    // Where the signing hand attaches (end of the raised right forearm)
    const ANCHOR = { x: 250, y: 205 };

    let POSES = null;      // {letter: [[x,y,z]*21]}
    let REST = null;       // idle pose
    let seq = [];          // [{ch, pose}] play queue
    let seqIdx = -1;
    let phase = 'idle';    // idle | transition | hold
    let phaseStart = 0;
    let fromPose = null, toPose = null;

    const apiBase = (API_BASE ?? location.origin)
      .replace("//0.0.0.0", "//localhost");

    // ---------- bootstrap: fetch rest pose so the idle figure can draw ----
    (async () => {
      try {
        const r = await fetch(apiBase + '/poses');
        if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
        POSES = await r.json();
        REST = POSES['B'] || Object.values(POSES)[0];
        t2sStatus.textContent =
          Object.keys(POSES).length + ' letter poses loaded';
        drawFigure(REST);
      } catch (err) {
        t2sStatus.textContent = 'poses unavailable: ' + err.message;
      }
    })();

    // ---------- drawing ----------
    function line(x1, y1, x2, y2, w, color) {
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
      ctx.lineWidth = w;
      ctx.strokeStyle = color;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    function drawBody() {
      const c = 'rgba(232,232,240,0.8)';
      // head
      ctx.beginPath();
      ctx.arc(150, 90, 26, 0, Math.PI * 2);
      ctx.lineWidth = 3.5; ctx.strokeStyle = c; ctx.stroke();
      // subtle smile
      ctx.beginPath();
      ctx.arc(150, 94, 11, 0.25 * Math.PI, 0.75 * Math.PI);
      ctx.lineWidth = 2; ctx.stroke();
      // torso
      line(150, 116, 150, 260, 3.5, c);
      // legs
      line(150, 260, 118, 360, 3.5, c);
      line(150, 260, 182, 360, 3.5, c);
      // left arm, relaxed
      line(150, 150, 105, 230, 3.5, c);
      // right arm raised toward the signing hand:
      // shoulder -> elbow -> wrist(anchor)
      line(150, 150, 228, 185, 3.5, c);
      line(228, 185, ANCHOR.x, ANCHOR.y + 18, 3.5, c);
    }

    function drawHandPose(pose) {
      const P = pose.map(p => [
        ANCHOR.x + p[0] * HAND_SCALE,
        ANCHOR.y + p[1] * HAND_SCALE,
      ]);
      ctx.strokeStyle = 'rgba(52,245,197,0.85)';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      for (const [a, b] of CONNECTIONS) {
        ctx.beginPath();
        ctx.moveTo(P[a][0], P[a][1]);
        ctx.lineTo(P[b][0], P[b][1]);
        ctx.stroke();
      }
      P.forEach((p, i) => {
        ctx.beginPath();
        ctx.arc(p[0], p[1], i % 4 === 0 ? 4.5 : 3, 0, Math.PI * 2);
        ctx.fillStyle = i % 4 === 0 ? '#34f5c5' : '#ffffff';
        ctx.fill();
      });
    }

    function drawFigure(pose) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBody();
      if (pose) drawHandPose(pose);
    }

    // ---------- animation ----------
    const ease = t => t < 0.5
      ? 4 * t * t * t
      : 1 - Math.pow(-2 * t + 2, 3) / 2;

    const lerpPose = (a, b, t) =>
      a.map((p, i) => [
        p[0] + (b[i][0] - p[0]) * t,
        p[1] + (b[i][1] - p[1]) * t,
      ]);

    function renderLetters() {
      lettersEl.innerHTML = seq.map((s, i) =>
        `<span style="color:${i === seqIdx ? 'var(--accent)' : 'var(--dim)'};
          font-weight:${i === seqIdx ? '700' : '400'};">` +
        (s.ch === ' ' ? '·' : s.ch) + '</span>'
      ).join('');
    }

    function tick(now) {
      if (phase === 'idle') { drawFigure(REST); return; }

      const elapsed = now - phaseStart;
      if (phase === 'transition') {
        const t = Math.min(elapsed / TRANSITION_MS, 1);
        drawFigure(lerpPose(fromPose, toPose, ease(t)));
        if (t >= 1) { phase = 'hold'; phaseStart = now; }
      } else if (phase === 'hold') {
        drawFigure(toPose);
        if (elapsed >= HOLD_MS) advance(now);
      }
      requestAnimationFrame(tick);
    }

    function advance(now) {
      seqIdx++;
      if (seqIdx >= seq.length) {
        // done: ease back to rest
        fromPose = toPose; toPose = REST;
        seq = []; seqIdx = -1;
        renderLetters();
        phase = 'transition'; phaseStart = now;
        setTimeout(() => { phase = 'idle'; drawFigure(REST); },
                   TRANSITION_MS + 30);
        t2sStatus.textContent = 'done';
        return;
      }
      fromPose = toPose || REST;
      toPose = seq[seqIdx].pose;
      renderLetters();
      t2sStatus.textContent = seq[seqIdx].ch === ' '
        ? 'signing: (space)' : 'signing: ' + seq[seqIdx].ch;
      phase = 'transition';
      phaseStart = now;
    }

    async function play() {
      const text = input.value;
      if (!text.trim()) return;
      t2sStatus.textContent = 'requesting animation…';
      let plan;
      try {
        const r = await fetch(apiBase + '/sign', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
        plan = await r.json();
      } catch (err) {
        t2sStatus.textContent = 'sign request failed: ' + err.message;
        return;
      }
      // The server owns the animation plan: poses, order, and timing.
      REST = plan.rest_pose;
      TRANSITION_MS = plan.transition_ms;
      HOLD_MS = plan.hold_ms;
      seq = plan.sequence;
      if (plan.skipped.length) {
        console.debug('unsignable characters skipped:', plan.skipped);
      }
      seqIdx = -1;
      toPose = REST;
      advance(performance.now());
      requestAnimationFrame(tick);
    }

    playBtn.onclick = play;
    input.onkeydown = (e) => { if (e.key === 'Enter') play(); };
    stopBtn.onclick = () => {
      seq = []; seqIdx = -1; phase = 'idle';
      renderLetters(); drawFigure(REST);
      t2sStatus.textContent = 'stopped';
    };
  })();
</script>
</body>
</html>
